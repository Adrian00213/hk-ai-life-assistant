<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>左右幫 - 社區互助平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        
        .container {
            max-width: 500px;
            padding: 40px 20px;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .slogan {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        .app-showcase {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .app-title {
            font-size: 16px;
            margin-bottom: 15px;
            opacity: 0.8;
        }
        
        .app-screens {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .screen {
            background: white;
            border-radius: 15px;
            padding: 10px;
            width: 120px;
            text-align: center;
        }
        
        .screen-preview {
            height: 80px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .screen-name {
            font-size: 11px;
            color: #333;
        }
        
        .features {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .feature-text {
            font-size: 14px;
        }
        
        .cta-btn {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #667eea;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s;
        }
        
        .cta-btn:hover {
            transform: scale(1.05);
        }
        
        .footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🤝</div>
        <h1>左右幫</h1>
        <p class="slogan">左鄰右里，幫幫手</p>
        
        <div class="app-showcase">
            <div class="app-title">功能預覽</div>
            <div class="app-screens">
                <div class="screen">
                    <div class="screen-preview">🏠</div>
                    <div class="screen-name">首頁</div>
                </div>
                <div class="screen">
                    <div class="screen-preview">🐾</div>
                    <div class="screen-name">寵物照顧</div>
                </div>
                <div class="screen">
                    <div class="screen-preview">👶</div>
                    <div class="screen-name">托兒服務</div>
                </div>
                <div class="screen">
                    <div class="screen-preview">👤</div>
                    <div class="screen-name">會員中心</div>
                </div>
            </div>
        </div>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">🐾</div>
                <div class="feature-text">寵物照顧 - 離家時不再擔心</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">👶</div>
                <div class="feature-text">托兒服務 - 專業師奶幫你睇小朋友</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🍲</div>
                <div class="feature-text">私房湯 - 為你和家人送上愛心湯水</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔧</div>
                <div class="feature-text">工具租借 - 電鑽、洗地機應有盡有</div>
            </div>
        </div>
        
        <a href="index.html" class="cta-btn">打開App原型 →</a>
        
        <div class="footer">
            左右幫 - 2026<br>
            香港社區互助平台
        </div>
    </div>
</body>
</html>
